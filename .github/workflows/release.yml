name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          tools: 'tools_mingw1310_64'
          cache: true

      - name: Find MinGW
        run: |
          $mingw = Get-ChildItem "C:\Users\runneradmin\AppData\Local\aqt" -Recurse -Filter "mingw32-make.exe" | Select-Object -First 1
          if (-not $mingw) {
            $mingw = Get-ChildItem "D:\a" -Recurse -Filter "mingw32-make.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          echo "MINGW_PATH=$($mingw.DirectoryName)" >> $env:GITHUB_ENV
          echo "Found MinGW at: $($mingw.DirectoryName)"

      - name: Configure CMake
        run: |
          cmake -B build `
            -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MAKE_PROGRAM="${{ env.MINGW_PATH }}\mingw32-make.exe"

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy
        run: |
          mkdir release
          copy build\RedstoneEngineer.exe release\
          windeployqt --release release\RedstoneEngineer.exe

      - name: Package
        run: |
          cd release
          7z a ..\RedstoneEngineer-${{ github.ref_name }}-windows.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "RedstoneEngineer ${{ github.ref_name }}"
          files: RedstoneEngineer-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}