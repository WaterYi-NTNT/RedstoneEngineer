name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          tools: 'tools_mingw1310'
          cache: true

      - name: Add MinGW to PATH
        run: |
          $mingw = Get-ChildItem "$env:RUNNER_WORKSPACE" -Recurse -Filter "mingw32-make.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($mingw) {
            echo "$($mingw.DirectoryName)" >> $env:GITHUB_PATH
            echo "Found MinGW: $($mingw.DirectoryName)"
          } else {
            echo "MinGW not found, searching Qt dir..."
            $mingw2 = Get-ChildItem "D:\a\RedstoneEngineer\Qt" -Recurse -Filter "mingw32-make.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            echo "$($mingw2.DirectoryName)" >> $env:GITHUB_PATH
            echo "Found MinGW: $($mingw2.DirectoryName)"
          }

      - name: Configure CMake
        run: |
          cmake -B build `
            -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy
        run: |
          mkdir release
          copy build\RedstoneEngineer.exe release\
          windeployqt --release release\RedstoneEngineer.exe

      - name: Package
        run: |
          cd release
          7z a ..\RedstoneEngineer-${{ github.ref_name }}-windows.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "RedstoneEngineer ${{ github.ref_name }}"
          files: RedstoneEngineer-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}